# ACT-Lang-B mini-trial config.
#
# This is intentionally tiny and is only for checking one minibatch, model
# forward/backward, validation, checkpoint writing, and language-token wiring.

experiment:
  name: act_lang_B_mini
  seed: 1000
  output_dir: project/outputs/act_lang_B/mini_trial

dataset:
  repo_id: local/calvin_lang_B
  root: /EXT_DISK/users/zengzixuan/processed-calvin/calvin_lang_B
  train_episodes: "0:8"
  val_episodes: "5503:5507"
  use_imagenet_stats: true
  return_uint8: true
  video_backend: null

policy:
  type: act_lang
  device: cuda:0
  use_amp: false
  push_to_hub: false
  pretrained_backbone_weights: ResNet18_Weights.IMAGENET1K_V1
  n_obs_steps: 1
  chunk_size: 100
  n_action_steps: 100
  vision_backbone: resnet18
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  n_encoder_layers: 4
  n_decoder_layers: 1
  use_vae: true
  latent_dim: 32
  n_vae_encoder_layers: 4
  dropout: 0.1
  kl_weight: 10.0
  optimizer_lr: 1.0e-5
  optimizer_weight_decay: 1.0e-4
  optimizer_lr_backbone: 1.0e-5
  language_embedding_key: observation.language_embedding
  language_embedding_dim: 384
  language_fusion: conditioning_token
  language_projection_dim: 512

training:
  batch_size: 2
  steps: 2
  num_workers: 0
  log_freq: 1
  val_freq: 1
  max_val_batches: 1
  grad_clip_norm: 10.0
  save_checkpoint: true
  save_freq: 0
  progress_bar: true
