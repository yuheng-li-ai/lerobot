# ACT-B full-scale training config.
# Architecture/hyperparameters must be mirrored in ACT-ABC unless an explicit ablation changes them.

experiment:
  name: act_B_full
  seed: 1000
  # The launcher overrides this with a timestamped directory under $CALVIN_RUNS.
  output_dir: /EXT_DISK/users/zengzixuan/calvin_runs/act_B/full_manual_override

dataset:
  repo_id: local/calvin_B
  root: /EXT_DISK/users/zengzixuan/processed-calvin/calvin_B
  # Converted B has 235 episodes/segments. Use a deterministic 90/10 split.
  train_episodes: "0:212"
  val_episodes: "212:235"
  use_imagenet_stats: true
  return_uint8: true
  video_backend: null

policy:
  type: act
  device: cuda:0
  use_amp: false
  push_to_hub: false
  pretrained_backbone_weights: ResNet18_Weights.IMAGENET1K_V1
  n_obs_steps: 1
  chunk_size: 100
  n_action_steps: 100
  vision_backbone: resnet18
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  n_encoder_layers: 4
  n_decoder_layers: 1
  use_vae: true
  latent_dim: 32
  n_vae_encoder_layers: 4
  dropout: 0.1
  kl_weight: 10.0
  optimizer_lr: 1.0e-5
  optimizer_weight_decay: 1.0e-4
  optimizer_lr_backbone: 1.0e-5

training:
  batch_size: 32
  steps: 100000
  num_workers: 4
  log_freq: 100
  val_freq: 5000
  max_val_batches: 64
  grad_clip_norm: 10.0
  save_checkpoint: true
  save_freq: 10000
  progress_bar: true
