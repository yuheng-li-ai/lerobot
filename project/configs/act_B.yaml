# ACT-B mini-trial and training config.
# Keep architecture/hyperparameters identical with ACT-ABC unless an explicit ablation changes them.

experiment:
  name: act_B
  seed: 1000
  output_dir: project/outputs/act_B/mini_trial

dataset:
  repo_id: local/calvin_B
  root: /EXT_DISK/users/zengzixuan/processed-calvin/calvin_B
  train_episodes: [0, 1, 2, 3]
  val_episodes: [4, 5]
  use_imagenet_stats: true
  return_uint8: true
  video_backend: null

policy:
  type: act
  device: cuda:0
  use_amp: false
  push_to_hub: false
  # Cached through torchvision under:
  # /EXT_DISK/users/zengzixuan/calvin_runs/torch_cache/hub/checkpoints/resnet18-f37072fd.pth
  # Set TORCH_HOME=/EXT_DISK/users/zengzixuan/calvin_runs/torch_cache before training.
  pretrained_backbone_weights: ResNet18_Weights.IMAGENET1K_V1
  n_obs_steps: 1
  chunk_size: 100
  n_action_steps: 100
  vision_backbone: resnet18
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  n_encoder_layers: 4
  n_decoder_layers: 1
  use_vae: true
  latent_dim: 32
  n_vae_encoder_layers: 4
  dropout: 0.1
  kl_weight: 10.0
  optimizer_lr: 1.0e-5
  optimizer_weight_decay: 1.0e-4
  optimizer_lr_backbone: 1.0e-5

training:
  batch_size: 2
  steps: 20
  num_workers: 0
  log_freq: 1
  val_freq: 10
  max_val_batches: 4
  grad_clip_norm: 10.0
  save_checkpoint: true
