experiment:
  name: act_ABC_size_matched
  seed: 1000
  output_dir: project/outputs/task2/act_ABC_size_matched/mini_trial
dataset:
  repo_id: local/calvin_ABC
  root: /EXT_DISK/users/zengzixuan/processed-calvin/calvin_ABC
  train_episodes:
  - 0
  - 1
  - 227
  - 228
  - 462
  - 463
  val_episodes:
  - 2
  - 3
  - 229
  - 230
  - 464
  - 465
  use_imagenet_stats: true
  return_uint8: true
  video_backend: null
policy:
  type: act
  device: cuda:1
  use_amp: false
  push_to_hub: false
  pretrained_backbone_weights: ResNet18_Weights.IMAGENET1K_V1
  n_obs_steps: 1
  chunk_size: 100
  n_action_steps: 100
  vision_backbone: resnet18
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  n_encoder_layers: 4
  n_decoder_layers: 1
  use_vae: true
  latent_dim: 32
  n_vae_encoder_layers: 4
  dropout: 0.1
  kl_weight: 10.0
  optimizer_lr: 1.0e-05
  optimizer_weight_decay: 0.0001
  optimizer_lr_backbone: 1.0e-05
training:
  batch_size: 2
  steps: 20
  num_workers: 0
  log_freq: 1
  val_freq: 10
  max_val_batches: 4
  grad_clip_norm: 10.0
  save_checkpoint: true
  progress_bar: true
